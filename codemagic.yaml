workflows:
  ios_release:
    name: iOS Release
    max_build_duration: 60
    environment:
      vars:
        XCODE_SCHEME: SkincareAI
        EXPORT_METHOD: app-store
      xcode: latest
    scripts:
      - name: Install Tuist & generate project
        script: |
          if ! command -v tuist >/dev/null; then
            brew update && brew install tuist
          fi
          tuist install
          tuist generate
      - name: Build & test (simulator)
        script: |
          xcodebuild -scheme "$XCODE_SCHEME" -destination 'platform=iOS Simulator,name=iPhone 16' clean test | xcpretty
      - name: Archive
        script: |
          xcodebuild -scheme "$XCODE_SCHEME" -configuration Release -archivePath $CM_BUILD_DIR/App.xcarchive -allowProvisioningUpdates clean archive | xcpretty
      - name: Export .ipa
        script: |
          xcodebuild -exportArchive -archivePath $CM_BUILD_DIR/App.xcarchive -exportPath $CM_BUILD_DIR -exportOptionsPlist <(cat <<PLIST
          { "method": "${EXPORT_METHOD}", "signingStyle": "automatic", "uploadSymbols": true }
          PLIST
          )
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
    code_signing:
      xcode_automatic_signing: true
